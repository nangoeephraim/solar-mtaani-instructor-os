<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta Tags -->
  <title>PRISM - Premium Instructor Management System</title>
  <meta name="description"
    content="PRISM - A premium competency-based training management system for NITA-compliant assessments. Track student progress, attendance, and competencies with smart insights." />
  <meta name="keywords"
    content="PRISM, solar training, instructor management, NITA assessment, student tracking, competency management, attendance tracker" />
  <meta name="author" content="PRISM" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="PRISM - Premium Instructor Management System" />
  <meta property="og:description"
    content="PRISM - A premium competency-based training management system for NITA-compliant assessments." />
  <meta property="og:image" content="/logo.png" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PRISM" />
  <link rel="apple-touch-icon" href="/logo.png" />

  <!-- Preconnect for faster font loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/logo.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');

    :root {
      /* Google Material Design 3 Color Tokens */
      --md-sys-color-primary: #1a73e8;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-primary-container: #d3e3fd;
      --md-sys-color-secondary: #5f6368;
      --md-sys-color-surface: #ffffff;
      --md-sys-color-surface-variant: #f1f3f4;
      --md-sys-color-background: #f8f9fa;
      --md-sys-color-error: #d93025;
      --md-sys-color-success: #1e8e3e;
      --md-sys-color-warning: #f9ab00;
      --md-sys-color-outline: #dadce0;

      /* Google Brand Colors */
      --google-blue: #4285f4;
      --google-red: #ea4335;
      --google-yellow: #fbbc04;
      --google-green: #34a853;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--md-sys-color-background);
      color: #202124;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    .font-google {
      font-family: 'Google Sans', 'Roboto', sans-serif;
    }

    /* Google Material 3 Panels */
    .glass-panel {
      background: var(--md-sys-color-surface);
      border-radius: 16px;
      box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
      border: none;
    }

    .glass-card {
      background: var(--md-sys-color-surface);
      border-radius: 12px;
      border: 1px solid var(--md-sys-color-outline);
      box-shadow: none;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-card:hover {
      box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 2px 6px 2px rgba(60, 64, 67, 0.15);
      transform: translateY(-1px);
    }

    /* Google Buttons */
    .glass-button {
      background: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 20px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Google Sans', 'Roboto', sans-serif;
      font-weight: 500;
      color: var(--md-sys-color-primary);
      position: relative;
      overflow: hidden;
    }

    .glass-button:hover {
      background: var(--md-sys-color-primary-container);
      box-shadow: none;
    }

    .btn-primary {
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      border: none;
      border-radius: 20px;
      box-shadow: 0 1px 2px 0 rgba(66, 133, 244, 0.3), 0 1px 3px 1px rgba(66, 133, 244, 0.15);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-primary:hover {
      background-color: #1765cc;
      box-shadow: 0 1px 3px 0 rgba(66, 133, 244, 0.4), 0 4px 8px 3px rgba(66, 133, 244, 0.15);
      transform: translateY(-1px);
    }

    /* Ripple Effect Container */
    .ripple {
      position: relative;
      overflow: hidden;
    }

    .ripple::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, var(--md-sys-color-primary) 10%, transparent 10.01%);
      background-repeat: no-repeat;
      background-position: 50%;
      transform: scale(10, 10);
      opacity: 0;
      transition: transform 0.4s, opacity 0.8s;
    }

    .ripple:active::after {
      transform: scale(0, 0);
      opacity: 0.2;
      transition: 0s;
    }

    /* Google Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.3);
      background-clip: padding-box;
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(0.8);
        opacity: 1;
      }

      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }

    .animate-slide-up {
      animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .animate-scale-in {
      animation: scaleIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* Skeleton Loader */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }

    /* Google-style Focus Ring */
    *:focus-visible {
      outline: 2px solid var(--md-sys-color-primary);
      outline-offset: 2px;
    }

    /* Stagger animation delays */
    .stagger-1 {
      animation-delay: 0.05s;
    }

    .stagger-2 {
      animation-delay: 0.1s;
    }

    .stagger-3 {
      animation-delay: 0.15s;
    }

    .stagger-4 {
      animation-delay: 0.2s;
    }

    .stagger-5 {
      animation-delay: 0.25s;
    }

    /* Custom Scrollbar for specific containers */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.15);
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
