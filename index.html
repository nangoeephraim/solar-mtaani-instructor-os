<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- SEO Meta Tags -->
  <title>PRISM - Illuminating Learning</title>
  <meta name="description"
    content="PRISM - A premium competency-based training management system for NITA-compliant assessments. Track student progress, attendance, and competencies with smart insights." />
  <meta name="keywords"
    content="PRISM, solar training, instructor management, NITA assessment, student tracking, competency management, attendance tracker" />
  <meta name="author" content="PRISM" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="PRISM - Premium Instructor Management System" />
  <meta property="og:description"
    content="PRISM - A premium competency-based training management system for NITA-compliant assessments." />
  <meta property="og:image" content="/logo.png" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PRISM" />
  <link rel="apple-touch-icon" href="/logo.png" />

  <!-- Preconnect for faster font loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/logo.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            google: ['Outfit', 'sans-serif'], // Re-purposing the 'google' class to use Outfit
            outfit: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <!-- Design system styles loaded via globals.css in index.tsx -->

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
